name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS app
        run: npx electron-packager . PianoSpark --platform=darwin --arch=${{ matrix.arch }} --out=dist --overwrite --icon=icon.png --ignore="(dist|node_modules|tests|docs|\.git)"

      - name: Create zip
        run: |
          cd dist
          zip -r -y "PianoSpark-mac-${{ matrix.arch }}.zip" "PianoSpark-darwin-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoSpark-mac-${{ matrix.arch }}
          path: dist/PianoSpark-mac-${{ matrix.arch }}.zip
